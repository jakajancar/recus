  # ── Locations ───────────────────────────────────────────
  /v1/locations/{locationId}:
    get:
      operationId: getLocation
      tags: [Locations]
      summary: Get location detail
      description: |
        Returns location detail with all sites.

        **Note:** The response nests sites under a `courts` key, but this array contains **all** site types (courts, fields, rooms, picnic tables, etc.), not just courts. Similarly, `courtNumber` is the display name for any site type (e.g. `"Court 1"`, `"Picnic Table A"`, `"Room 201"`).

        **Key fields on each site in `courts[]`:**
        - `courts[].courtNumber` — the display name for any site, despite the field name.
        - `courts[].noReservationText` — if set (e.g. `"Not Reservable"`), the site is walk-up only.
        - `courts[].availableSlots` — bookable start times as `"YYYY-MM-DD HH:MM:SS"` strings in the location's timezone. Covers the upcoming reservation window.
        - `courts[].allowedReservationDurations` — the set of durations this site supports.
        - `courts[].config.bookingPolicies` — optional. When present with `type: "fixed-slots"` and `isActive: true`, the site uses pre-defined time blocks. See "Computing per-slot durations client-side" in the API description.
        - `courts[].isInstantBookable` — whether the site can be booked directly.
        - `courts[].sports[].sportId` — references a global sport. The sport **name** is not included here; it appears in the schedule endpoint.
        - `defaultReservationWindow` — how many days in advance reservations open (e.g. 7 = one week ahead).
        - `reservationReleaseTimeLocal` — the local time when new reservation slots become available (e.g. `"08:00:00"` = 8 AM).
        - `playGuidelines` — detailed markdown with reservation rules, site assignments, hours, etc.
      parameters:
        - $ref: '#/components/parameters/LocationId'
        - name: publishedSites
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Set to "true" to filter to only published (bookable) sites. Without this, all sites are returned including unpublished/inactive ones.
      responses:
        '200':
          description: Location detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    $ref: '#/components/schemas/LocationDetail'
              example:
                location:
                  id: 95745483-6b38-4e99-8ba2-a3e23cda8587
                  name: Dolores
                  description: TBD
                  formattedAddress: "3753 18th St, San Francisco, CA 94114, USA"
                  lat: "37.76100510000001"
                  lng: "-122.4271707"
                  placeId: ChIJ_c7oyBl-j4ARczOfJmf4QzU
                  hoursOfOperation: "7:00am to 9:00pm"
                  timezone: America/Los_Angeles
                  playGuidelines: "Markdown string with reservation policy, court info, etc."
                  accessInfo: "Courts are unlocked..."
                  gettingThereInfo: "The courts are located along the north side..."
                  defaultReservationWindow: 7
                  reservationReleaseTimeLocal: "08:00:00"
                  reservationBuffer: 0
                  privateLessonReservationWindow: 0
                  organizationId: 17380e28-7e02-4b52-82c5-fab18557fd7a
                  images:
                    detail: "https://..."
                    thumbnail: "https://..."
                    mainGallery: "https://..."
                    smallGallery1: "https://..."
                    smallGallery2: "https://..."
                  organization:
                    id: 17380e28-7e02-4b52-82c5-fab18557fd7a
                    name: San Francisco Rec & Park
                    slug: san-francisco-rec-park
                  courts:
                    - id: 8ad0975e-9498-4bca-8832-26368ca54de7
                      courtNumber: Court 1
                      maxReservationTime: "01:30:00"
                      noReservationText: null
                      allowPrivateLessons: false
                      type: court
                      capacity: null
                      description: null
                      bufferMinutesBetweenReservations: 0
                      allowedReservationDurations:
                        minutes: [30, 60, 90]
                      config:
                        pricing:
                          default:
                            type: perHour
                            cents: 500
                      sports:
                        - id: 65751cfa-31f5-4e0f-a5db-5bc2079f4ac0
                          courtId: 8ad0975e-9498-4bca-8832-26368ca54de7
                          sportId: bd745b6e-1dd6-43e2-a69f-06f094808a96
                          price: 0
                          currency: USD
                      images:
                        map: []
                        mainGallery: []
                      amenities:
                        amenityTagIds: []
                  tags: []
                  regions: []

  # ── Schedule ────────────────────────────────────────────
  /v1/locations/{locationId}/schedule:
    get:
      operationId: getLocationSchedule
      tags: [Locations]
      summary: Get schedule
      description: |
        Returns the schedule for **all sites** at a location for the given date range.

        **Schedule slot keys** are formatted as `"HH:MM, HH:MM"` (start time, end time in 24h local time).

        **`referenceType` values:**

        | Value | Meaning |
        |---|---|
        | `RESERVABLE` | Open slot — can be booked |
        | `RESERVATION` | Already booked — `referenceId` links to the `reservations` dict |
        | `OPEN` | Not reservable — `referenceLabel` explains why (e.g. "Not Reservable" for walk-up courts or outside bookable hours) |

        **`reservations` dict:** Keyed by reservation UUID. Contains cost (in cents), who booked it (`users[]`), which site (`courts[]` — key name is misleading), and whether it's a regular reservation, lesson, or class.

        **`users` dict:** Keyed by user UUID. Only shows first initial and last initial for privacy. Includes `skillLevel` (e.g. "first-timer", "beginner", "intermediate", "advanced").

        **`instructors`, `classes`, `sessions`, `facilityRentals` dicts:** Populated when the schedule includes instructor lessons, group classes, or facility rentals. Empty for pure reservation schedules.

        **Note:** The schedule response uses `courtNumber` as the display name for each site entry, even for non-court site types. There is no site UUID in the schedule's per-site entries — only `courtNumber` and `sports`. Site UUIDs appear only in `reservations[].courts[]` for booked slots.
      parameters:
        - $ref: '#/components/parameters/LocationId'
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD).
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Defaults to same as startDate.
      responses:
        '200':
          description: Schedule data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
              example:
                dates:
                  "20260301":
                    - courtNumber: Court 1
                      sports:
                        - id: bd745b6e-1dd6-43e2-a69f-06f094808a96
                          name: Tennis
                      schedule:
                        "07:00, 07:30":
                          referenceType: OPEN
                          referenceLabel: Not Reservable
                        "07:30, 09:00":
                          referenceType: RESERVATION
                          referenceId: bc5ddf13-26bb-4fec-9077-a3d47995b652
                        "12:00, 13:30":
                          referenceType: RESERVABLE
                        "21:00, 22:00":
                          referenceType: OPEN
                          referenceLabel: Not Reservable
                reservations:
                  bc5ddf13-26bb-4fec-9077-a3d47995b652:
                    id: bc5ddf13-26bb-4fec-9077-a3d47995b652
                    reservationType: court-reservation
                    reservationCost: 750
                    reservationCostCurrency: USD
                    guestPrice: 750
                    capacity: 1
                    paid: true
                    visibility: public
                    doNotMarket: false
                    groupsOnly: null
                    classId: null
                    sessionId: null
                    instructorId: null
                    facilityRentalId: some-uuid
                    linkedReservationId: some-uuid
                    locationId: 95745483-6b38-4e99-8ba2-a3e23cda8587
                    users: [user-uuid]
                    courts: [court-uuid]
                users:
                  user-uuid:
                    id: user-uuid
                    firstName: K
                    lastName: N
                    image: null
                    skillLevel: first-timer
                    primarySportId: null
                instructors: {}
                classes: {}
                sessions: {}
                facilityRentals: {}

  /v1/locations/availability:
    get:
      operationId: listLocationAvailability
      tags: [Locations]
      summary: Get available slots across locations
      description: |
        Multi-location equivalent of `GET /v1/locations/{locationId}` — returns the same `courts[].availableSlots` structure but across many locations at once. Also the only way to list locations for a specific organization (the single-location endpoint does not support org filtering).

        Response is a subset of the location detail endpoint — same `courts[]` structure (see its docs for field descriptions) but without `playGuidelines`, `organization`, `regions`, `schedule`, and a few other location/court fields.

        - `distance` — populated when filtering by lat/lng, otherwise null.
        - Only locations with at least one site are returned. Locations with zero available slots are still included (check `availableSlots` length).
      parameters:
        - name: regionId
          in: query
          schema:
            type: string
            format: uuid
          description: UUID of a region. At least one of regionId, organizationSlug, or latitude/longitude is required.
        - name: organizationSlug
          in: query
          schema:
            type: string
          description: Organization slug (e.g. `san-francisco-rec-park`).
        - name: latitude
          in: query
          schema:
            type: number
          description: Latitude for geo filter.
        - name: longitude
          in: query
          schema:
            type: number
          description: Longitude for geo filter.
        - name: publishedSites
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Set to "true" to filter to only published (bookable) sites. Without this, all sites are returned including unpublished/inactive ones.
      responses:
        '200':
          description: List of locations with availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityLocationWrapper'
              example:
                - distance: null
                  location:
                    id: 81cd2b08-8ea6-40ee-8c89-aeba92506576
                    name: Alice Marble
                    formattedAddress: "1200 Greenwich St, San Francisco, CA 94109, USA"
                    lat: "37.7977"
                    lng: "-122.4179"
                    hoursOfOperation: "7:00am to 7:30pm"
                    timezone: America/Los_Angeles
                    organizationId: 17380e28-7e02-4b52-82c5-fab18557fd7a
                    defaultReservationWindow: 7
                    reservationReleaseTimeLocal: "08:00:00"
                    playGuidelines: "..."
                    images:
                      thumbnail: "https://..."
                    courts:
                      - id: court-uuid
                        courtNumber: Court 1
                        maxReservationTime: "01:30:00"
                        type: court
                        sports:
                          - id: some-uuid
                            sportId: bd745b6e-1dd6-43e2-a69f-06f094808a96
                        config:
                          pricing:
                            default:
                              type: perHour
                              cents: 500
                        allowedReservationDurations:
                          minutes: [30, 60, 90]
                        availableSlots:
                          - "2026-03-02 07:30:00"
                          - "2026-03-02 08:00:00"
                          - "2026-03-02 08:30:00"
                          - "2026-03-02 09:00:00"
                        slots:
                          - type: PRIVATE
                            openFrom: "07:30:00"
                            openTo: "19:30:00"
                            dayOfWeek: 1


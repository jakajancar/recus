  # ── Discovery / Programmed Sections ─────────────────────
  /v1/discovery/programmed:
    get:
      operationId: listProgrammedSections
      tags: [Discovery]
      summary: List available programs and group classes
      description: |
        Returns available programs and group classes for a given organization, location, or region within a date range.

        **Notes:**
        - `capacity` — max participants. `participantCount` — currently enrolled. Available spots = `capacity - participantCount`.
        - `sessions[]` — individual meeting dates/times. Timestamps are in the section's timezone.
        - `recommendedLevel` — skill level (e.g. "all", "beginner", "intermediate", "advanced").
        - Types of sections include lesson packs (1:1, capacity=1), small group lessons (capacity=4), and other programs.
      parameters:
        - name: organizationId
          in: query
          schema:
            type: string
            format: uuid
          description: Organization UUID. At least one of organizationId, locationId, regionId, or instructorId is required.
        - name: locationId
          in: query
          schema:
            type: string
            format: uuid
          description: Location UUID.
        - name: regionId
          in: query
          schema:
            type: string
            format: uuid
          description: Region UUID.
        - name: instructorId
          in: query
          schema:
            type: string
            format: uuid
          description: Instructor UUID.
        - name: sportIds
          in: query
          schema:
            type: string
          description: Filter by sport ID.
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD).
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD).
      responses:
        '200':
          description: List of programs/sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DiscoverySection'
              example:
                - id: 850b8843-f2e5-40ea-a709-4c3e98a9af5c
                  name: Pickleball Small Group Lessons - Adults
                  timezone: America/Los_Angeles
                  recommendedLevel: all
                  sportId: bd745b6e-1dd6-43e2-a69f-06f094808a96
                  sportName: Pickleball
                  locationName: Rossi
                  capacity: 4
                  participantCount: 0
                  facilitators:
                    - id: instructor-uuid
                      firstName: Jane
                      lastName: Doe
                      imageUrl: "https://..."
                  sessions:
                    - timestampRange: ["2026-03-01 12:00:00", "2026-03-01 13:00:00"]
                    - timestampRange: ["2026-03-08 12:00:00", "2026-03-08 13:00:00"]
                    - timestampRange: ["2026-03-15 12:00:00", "2026-03-15 13:00:00"]
                    - timestampRange: ["2026-03-22 12:00:00", "2026-03-22 13:00:00"]

  # ── Sites ───────────────────────────────────────────────
  /v1/sites:
    get:
      operationId: listSites
      tags: [Sites]
      summary: List sites for an organization
      description: |
        Returns facility-rental sites for a given organization. **Paginated** (`results`/`total` envelope — see Pagination).

        **Only returns non-court site types** (picnic tables, bounce houses, gyms, outdoor event spaces, etc.). Courts, fields, and rinks are **not** included — those are accessed exclusively through the location endpoints (`GET /v1/locations/{id}` and `GET /v1/locations/availability`). Organizations that only have courts (e.g. `san-francisco-rec-park`) return `total: 0`.

        Response items have the same shape as `GET /v1/sites/{siteId}` `.data`.
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Organization UUID.
        - $ref: '#/components/parameters/PaginationBracketNum'
        - $ref: '#/components/parameters/PaginationBracketSize'
        - $ref: '#/components/parameters/PaginationFlatPage'
        - $ref: '#/components/parameters/PaginationFlatPageSize'
      responses:
        '200':
          description: Paginated list of sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SiteDetail'
                  total:
                    type: integer

  /v1/sites/{siteId}:
    get:
      operationId: getSite
      tags: [Sites]
      summary: Get site detail
      description: |
        Returns detailed information about a specific site, including whether it supports instant booking.

        **Notes:**
        - `courtNumber` — the display name (e.g. `"A"`, `"Court 1"`, `"Picnic Table 3"`), despite the field name.
        - `capacity` — 0 means no cap on attendees.
        - `isInstantBookable` — if `true`, the site can be booked directly via the facility-rentals endpoint. If `false`, the site may require a request/approval flow.
        - `noReservationText` — if set (e.g. `"Not Reservable"`), the site is walk-up only.
        - `config.bookingPolicies[]` — optional. When present with `type: "fixed-slots"`, the site uses pre-defined time blocks instead of flexible durations. The `timestampRange` in a facility-rental request **must** exactly match one of these slot boundaries, or the API will reject with `"The reservation violates the site's booking policy"`. `dayOfWeek` uses 1=Monday through 7=Sunday. If no `bookingPolicies` are present, the site uses flexible booking with `allowedReservationDurations`.
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Site detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SiteDetail'
              example:
                data:
                  id: 99b7129e-5ed4-4fd8-aba2-fee1683310bb
                  courtNumber: A
                  capacity: 0
                  isInstantBookable: true
                  noReservationText: null
                  locationId: 38a201f0-4fb1-4991-8e72-db8a9495319e
                  locationName: Granada Park
                  config:
                    pricing:
                      default:
                        type: perHour
                        cents: 0
                    deposits: {}
                    bookingPolicies:
                      - type: fixed-slots
                        isActive: true
                        slots:
                          - dayOfWeek: 1
                            startTimeLocal: "07:30:00"
                            endTimeLocal: "09:00:00"
                          - dayOfWeek: 1
                            startTimeLocal: "09:00:00"
                            endTimeLocal: "10:30:00"
                  allowedReservationDurations:
                    minutes: [30, 60, 90, 120]
                  maxReservationTime: "02:00:00"
                  images:
                    map: []
                    mainGallery: []
                  descriptionMd: null
                  rulesMd: null

  /v1/sites/{siteId}/availability:
    get:
      operationId: getSiteAvailability
      tags: [Sites]
      summary: Get site availability
      description: |
        Returns available dates and time slots for a specific site.

        **Notes:**
        - Keys are dates (`YYYY-MM-DD`), values are objects keyed by start time (`HH:MM:SS`).
        - Each time slot lists which durations (in minutes) are available starting at that time.
        - This endpoint is used by the frontend to populate the time and duration pickers.
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Site availability
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      additionalProperties:
                        $ref: '#/components/schemas/SlotAvailability'
                      description: Keyed by start time (HH:MM:SS).
                    description: Keyed by date (YYYY-MM-DD).
              example:
                data:
                  "2026-03-05":
                    "08:00:00":
                      availableDurationsMinutes: [30, 60, 90, 120]
                    "08:30:00":
                      availableDurationsMinutes: [30, 60, 90]
                    "13:00:00":
                      availableDurationsMinutes: [30, 60, 90, 120]
                    "13:30:00":
                      availableDurationsMinutes: [30, 60, 90]

  /v1/sites/{siteId}/instant-booking-configuration:
    get:
      operationId: getSiteInstantBookingConfig
      tags: [Sites]
      summary: Get site instant booking configuration
      description: Returns the instant booking configuration for a site, if one exists. Returns 404 if not configured.
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Instant booking configuration
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sites/{siteId}/addons:
    get:
      operationId: listSiteAddons
      tags: [Sites]
      summary: Get site add-ons
      description: Returns add-ons available when booking a specific site.
      parameters:
        - $ref: '#/components/parameters/SiteId'
      responses:
        '200':
          description: Site add-ons
          content:
            application/json:
              schema:

          description: Markdown string with full bio, availability, pricing.
        canTeachPrivateLessons:
          type: boolean
        isPro:
          type: boolean
        tags:
          type: array
          items: {}
        certifications:
          type: array
          items: {}
        images:
          type: object
          properties:
            instructorAvatar80x80:
              type:
                - string
                - "null"
            instructor152x89:
              type:
                - string
                - "null"
            instructor152x240:
              type:
                - string
                - "null"
            instructor240x140:
              type:
                - string
                - "null"
        config:
          type: object
          properties:
            doNotMarketForLessons:
              type: boolean
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
            lastName:
              type: string
        sports:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              hourlyRate:
                type: integer
        instructorLocations:
          type: array
          description: Locations this instructor teaches at, with per-location hourly rates (may differ from the base rate in `sports[]`).
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              instructorId:
                type: string
                format: uuid
              locationId:
                type: string
                format: uuid
              hourlyRate:
                type: integer
              sportId:
                type: string
                format: uuid

    DiscoverySection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        timezone:
          type: string
        recommendedLevel:
          type: string
          description: 'Skill level (e.g. "all", "beginner", "intermediate", "advanced").'
        sportId:
          type: string
          format: uuid
        sportName:
          type: string
        locationName:
          type: string
        capacity:
          type: integer
          description: Max participants.
        participantCount:
          type: integer
          description: Currently enrolled. Available spots = capacity - participantCount.
        facilitators:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              firstName:
                type: string
              lastName:
                type: string
              imageUrl:
                type:
                  - string
                  - "null"
        sessions:
          type: array
          description: Individual meeting dates/times. Timestamps are in the section's timezone.
          items:
            type: object
            properties:
              timestampRange:
                type: array
                items:
                  type: string
                description: '[startTime, endTime] as "YYYY-MM-DD HH:MM:SS" strings.'

    SiteDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courtNumber:
          type: string
          description: Display name (e.g. "A", "Court 1", "Picnic Table 3"). Despite the field name, applies to all site types.
        capacity:
          type: integer
          description: 0 means no cap on attendees.
        isInstantBookable:
          type: boolean
          description: If true, the site can be booked directly via the facility-rentals endpoint. If false, may require request/approval flow.
        noReservationText:
          type:
            - string
            - "null"
          description: If set (e.g. "Not Reservable"), the site is walk-up only.
        locationId:
          type: string
          format: uuid
        locationName:
          type: string
        config:
          type: object
          properties:
            pricing:
              type: object
              properties:
                default:
                  $ref: '#/components/schemas/Pricing'
            deposits:
              type: object
            bookingPolicies:
              type: array
              items:
                $ref: '#/components/schemas/BookingPolicy'
              description: |
                Optional. When present with `type: "fixed-slots"` and `isActive: true`, the site uses pre-defined time blocks instead of flexible durations. The `timestampRange` in a facility-rental request **must** exactly match one of these slot boundaries, or the API will reject with "The reservation violates the site's booking policy". `dayOfWeek` uses 1=Monday through 7=Sunday.
        allowedReservationDurations:
          type: object
          properties:
            minutes:
              type: array
              items:
                type: integer
        maxReservationTime:
          type: string
          description: Maximum reservation duration as HH:MM:SS string.
        images:
          type: object
          properties:
            map:
              type: array
              items: {}
            mainGallery:
              type: array
              items: {}
        descriptionMd:
          type:
            - string
            - "null"
        rulesMd:
          type:
            - string
            - "null"

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: rec.us user UUID. Needed for user-scoped endpoints. **Not** the same as firebaseUserId.
        householdId:
          type: string
          format: uuid
        firebaseUserId:
          type: string
          description: Firebase UID.
        recId:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type:
            - string
            - "null"
        formattedAddress:
          type:
            - string
            - "null"
        skillLevel:
          type:
            - string
            - "null"
        isInstructor:
          type: boolean
        memberships:
          type: array
          items: {}
        organizationRoles:
          type: object
        profile:
          type: object
          properties:
            id:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid
            dateOfBirth:
              type:
                - string
                - "null"
            gender:
              type:
                - string
                - "null"
            email:
              type: string
              format: email
            phone:
              type:
                - string
                - "null"

    FacilityRentalRequest:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [reservation]
          properties:
            reservation:
              type: object
              required: [timestampRange, locationId, courtIds]
              properties:
                timestampRange:
                  type: string
                  description: |
                    PostgreSQL-style timestamp range. Format: `[start, end)` where `[` is inclusive and `)` is exclusive. Times are in the location's local timezone.
                  example: "[2026-03-05 13:00:00, 2026-03-05 14:00:00)"
                locationId:
                  type: string
                  format: uuid
                courtIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Site UUIDs to reserve. Despite the name, accepts any site type. Typically one site per reservation.

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        flow:
          type: string
        status:
          type: string
          description: 'Order status (e.g. "pending", "completed").'
        timeRemainingMs:
          type: [integer, "null"]
          description: Milliseconds remaining before order expires.
        expiresAt:
          type: [string, "null"]
          format: date-time
        currency:
          type: string
        subtotal:
          type: integer
          description: Subtotal in cents.
        total:
          type: integer
          description: Total in cents.
        totalAmountRemaining:
          type: integer
          description: Amount still owed in cents. Drops to 0 after payment.
        customer:
          type: object
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
              format: email
        organization:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        basePrice:
          type: integer
          description: Base price in cents.
        finalPrice:
          type: integer
          description: Final price in cents (after discounts).
        productType:
          type: string
          description: 'Product type (e.g. "site-reservation").'
        details:
          type: object
          properties:
            bookingId:
              type: string
              format: uuid
            reservationId:
              type: string
              format: uuid
            reservationType:
              type: string
            timestampRange:
              type: array
              items:
                type: string
              description: '[startTime, endTime] as "YYYY-MM-DD HH:MM:SS" strings.'
            location:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
            sites:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  type:
                    type:
                      - string
                      - "null"

    FacilityRental:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          description: 'Status (e.g. "confirmed").'
        bookingType:
          type: string
          description: 'Booking type (e.g. "instant").'
        canceledAt:
          type:
            - string
            - "null"
          format: date-time
        name:
          type: string

    PaymentRequest:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [payments]
          properties:
            payments:
              type: array
              items:
                type: object
                required: [paymentMethodType, amountCents]
                properties:
                  paymentMethodType:
                    type: string
                    enum:
                      - free
                      - ACH
                      - cardOnline
                      - organizationCredit
                      - check
                      - cash
                      - cardPresent
                      - giftCard
                      - scholarship
                    description: |
                      Payment method type. API-callable types: "free" ($0 only), "ACH" (triggers Stripe PaymentIntent for card payment). "cardOnline" is rejected with E_INVALID_BODY. Others may be admin-only or untested.
                  amountCents:
                    type: integer
                    description: Amount in cents. Must be 0 for "free" type.
                  checkNumber:
                    type: string
                    description: Required when paymentMethodType is "check".
                  providerReaderId:
                    type: string
                    description: Required when paymentMethodType is "cardPresent".
                  storedValueAccountCode:
                    type: string
                    description: Required when paymentMethodType is "giftCard" or "scholarship".

    TransactionEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: 'Event type (e.g. "payment").'
        status:
          type: string
          description: '"succeeded" for immediate settlement (free), "pending" for Stripe payments.'
        orderId:
          type: string
          format: uuid
        settledAt:
          type:
            - string
            - "null"
          format: date-time
          description: Set when payment is settled. Null for pending Stripe payments.

    PaymentWithGateway:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        referenceId:
          type: string
          description: Stripe PaymentIntent ID (pi_...).
        gateway:
          type: string
        gatewayData:
          type: object
          properties:
            provider:
              type: string
            paymentIntentId:
              type: string
              description: Stripe PaymentIntent ID (pi_...).
            clientSecret:
              type: string
              description: Client secret needed to confirm the PaymentIntent.
            paymentMethods:
              type: array
              items:
                $ref: '#/components/schemas/StripePaymentMethod'
              description: User's saved cards.
        amount:
          type: integer
          description: Amount in cents.
        currency:
          type: string
        status:
          type: string
        paymentMethodType:
          type: string

    StripePaymentMethod:
      type: object
      properties:
        id:
          type: string
          description: Stripe PaymentMethod ID (pm_...). Used when confirming a PaymentIntent via the Stripe API.
        card:
          type: object
          properties:
            brand:
              type: string
            exp_month:
              type: integer
            exp_year:
              type: integer
            last4:
              type: string

    PaymentMethodSetupData:
      type: object
      properties:
        provider:
          type: string
        setupIntentId:
          type: string
          description: Stripe SetupIntent ID. For adding new payment methods (not needed for paying with existing saved card).
        clientSecret:
          type: string
          description: Stripe SetupIntent client secret.
        paymentMethods:
          type: array
          items:
            $ref: '#/components/schemas/StripePaymentMethod'
          description: User's saved payment methods for this organization.

    BookingSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        canceledAt:
          type:
            - string
            - "null"
          format: date-time
          description: Non-null if the booking was cancelled. Note that status remains "confirmed" even after cancellation.
        cancelReason:
          type:
            - string
            - "null"
        canceledByUserId:
          type:
            - string
            - "null"
        creatorUserId:
          type: string
          format: uuid
        customerUserId:
          type: string
          format: uuid
        participantUserId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        isFastTrack:
          type: boolean
        sectionId:
          type:
            - string
            - "null"
        sessionId:
          type:
            - string
            - "null"
        linkedReservationId:
          type:
            - string
            - "null"
        facilityRentalId:
          type:
            - string
            - "null"
        type:
          type: string
          description: '"facilityRental" for site bookings, "session" for group classes, etc.'
        timeStatus:
          type: string
          description: '"future" for upcoming bookings, "past" for completed ones.'

    BookingDetailResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            booking:
              $ref: '#/components/schemas/BookingSummary'
        included:
          type: object
          description: Sideloaded relations based on include[] query parameter.
          properties:
            facilityRental:
              $ref: '#/components/schemas/FacilityRental'
            reservations:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  locationId:
                    type: string
                    format: uuid
                  reservationCost:
                    type: integer
                    description: Cost in cents.
                  reservationCostCurrency:
                    type: string
                  reservationType:
                    type: string
                  reservationTimestampRange:
                    type: array
                    items:
                      type: string
                    description: '[startTime, endTime] as "YYYY-MM-DD HH:MM:SS" strings.'
                  startsAt:
                    type: string
                    format: date-time
                    description: UTC start time.
                  endsAt:
                    type: string
                    format: date-time
                    description: UTC end time.
                  canceledAt:
                    type:
                      - string
                      - "null"
                    format: date-time
            sites:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  locationId:
                    type: string
                    format: uuid
                  courtNumber:
                    type: string
                    description: Display name for the site.
                  type:
                    type:
                      - string
                      - "null"
            locations:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  timezone:
                    type: string
            reservationSiteIds:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
                  format: uuid
              description: Maps reservation UUID to array of site UUIDs.
            customer:
              type: object
            participant:
              type:
                - object
                - "null"
            section:
              type: object

    RefundEligibility:
      type: object
      properties:
        suggestionGenerated:
          type: boolean
          description: Poll until this is true.
        eligibleUntil:
          type:
            - string
            - "null"
          format: date-time
          description: If in the future, a refund is available.
        recommendationJustification:
          type:
            - string
            - "null"

    RefundPreview:
      type: object
      description: |
        Refund preview. `applicable: false` for free ($0) bookings — no refund preview needed, just cancel directly.
      properties:
        applicable:
          type: boolean
        reason:
          type: string
          description: Present when applicable is false (e.g. "unsupported_booking_type").
        eligibleDestinations:
          type: array
          items:
            type: string
          description: 'Available refund destinations (e.g. "original_payment_methods", "account_credit").'
        destinations:
          type: object
          properties:
            originalPaymentMethods:
              $ref: '#/components/schemas/RefundDestination'
            accountCredit:
              $ref: '#/components/schemas/RefundDestination'
        refundType:
          type: string
          description: '"full", "partial", or "zero".'

    RefundDestination:
      type: object
      properties:
        amountCents:
          type: integer
        formattedAmount:
          type: string
        destinationSummary:
          type: string
